name: Market Analysis

on:
  # 朝 8:00 JST (23:00 UTC)、昼 12:00 JST (03:00 UTC)、晩 20:00 JST (11:00 UTC)
  schedule:
    - cron: '0 23 * * *'   # 朝  08:00 JST
    - cron: '0 3  * * *'   # 昼  12:00 JST
    - cron: '0 11 * * *'   # 晩  20:00 JST

  # admin.html から config.json が更新されたとき自動トリガー
  push:
    paths:
      - 'config.json'

  # 手動実行ボタン（GitHub ActionsのUIから）
  workflow_dispatch:

jobs:
  analyze:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # output/report.html をcommitするために必要

    steps:
      # ── リポジトリをチェックアウト ──────────────────────
      - name: Checkout
        uses: actions/checkout@v4

      # ── Python セットアップ ─────────────────────────────
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      # ── 依存パッケージインストール ──────────────────────
      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install yfinance pandas numpy plotly lightweight-charts 2>/dev/null || true
          # lightweight-chartsはPythonパッケージではないためエラーを無視
          pip install yfinance pandas numpy

      # ── lw_charts.js がなければnpmで取得 ────────────────
      - name: Fetch Lightweight Charts JS
        run: |
          if [ ! -f "lw_charts.js" ]; then
            echo "lw_charts.js not found, fetching via npm..."
            npm pack lightweight-charts --silent
            tar -xzf lightweight-charts-*.tgz
            cp package/dist/lightweight-charts.standalone.production.js lw_charts.js
            rm -rf package lightweight-charts-*.tgz
            echo "lw_charts.js fetched successfully"
          else
            echo "lw_charts.js already exists, skipping"
          fi

      # ── 分析実行 ────────────────────────────────────────
      - name: Run analysis
        run: |
          python analyze.py
        env:
          TZ: Asia/Tokyo

      # ── 生成ファイルをコミット & プッシュ ───────────────
      - name: Commit report
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add output/report.html
          # 変更がある場合のみコミット
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            TIMESTAMP=$(TZ=Asia/Tokyo date '+%Y-%m-%d %H:%M JST')
            git commit -m "📊 Update report [${TIMESTAMP}]"
            git push
          fi
