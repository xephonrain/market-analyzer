name: Market Analysis

on:
  schedule:
    - cron: '0 23 * * *'   # 朝 08:00 JST
    - cron: '0 3  * * *'   # 昼 12:00 JST
    - cron: '0 11 * * *'   # 晩 20:00 JST

  push:
    paths:
      - 'config.json'

  workflow_dispatch:

jobs:
  analyze:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install yfinance pandas numpy

      - name: Fetch Lightweight Charts JS
        run: |
          if [ ! -f "lw_charts.js" ]; then
            echo "lw_charts.js not found, fetching via npm..."
            npm pack lightweight-charts --silent
            tar -xzf lightweight-charts-*.tgz
            cp package/dist/lightweight-charts.standalone.production.js lw_charts.js
            rm -rf package lightweight-charts-*.tgz
            echo "lw_charts.js size: $(wc -c < lw_charts.js) bytes"
          else
            echo "lw_charts.js found: $(wc -c < lw_charts.js) bytes"
          fi

      - name: Debug environment
        run: |
          echo "=== Working directory ==="
          pwd
          echo "=== Files in root ==="
          ls -la
          echo "=== Python path ==="
          python -c "import sys; print(sys.path)"
          echo "=== lw_charts.js check ==="
          ls -lh lw_charts.js 2>/dev/null || echo "NOT FOUND"

      - name: Run analysis
        run: python analyze.py
        env:
          TZ: Asia/Tokyo

      - name: Check output
        run: |
          echo "=== output/report.html ==="
          ls -lh output/report.html 2>/dev/null || echo "NOT FOUND"
          echo "=== LightweightCharts in HTML ==="
          grep -c "LightweightCharts" output/report.html 2>/dev/null || echo "0"
          echo "=== createChart in HTML ==="
          grep -c "createChart" output/report.html 2>/dev/null || echo "0"
          echo "=== チャートなし count ==="
          grep -c "チャートなし" output/report.html 2>/dev/null || echo "0"

      - name: Commit report
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add output/report.html admin.html chart.py analyze.py report.py config_loader.py hot_stocks.py indicators/
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            TIMESTAMP=$(TZ=Asia/Tokyo date '+%Y-%m-%d %H:%M JST')
            git commit -m "📊 Update report [${TIMESTAMP}]"
            git push
          fi
