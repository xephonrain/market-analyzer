name: Market Analysis

on:
  schedule:
    - cron: '0 22 * * *'
    - cron: '0 3  * * *'
    - cron: '0 11 * * *'
  push:
    paths:
      - 'config.json'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  TZ: Asia/Tokyo

jobs:
  analyze:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install yfinance pandas numpy

      - name: Fetch Lightweight Charts JS
        run: |
          if [ ! -f "lw_charts.js" ]; then
            npm pack lightweight-charts --silent
            tar -xzf lightweight-charts-*.tgz
            cp package/dist/lightweight-charts.standalone.production.js lw_charts.js
            rm -rf package lightweight-charts-*.tgz
          fi
          echo "lw_charts.js: $(wc -c < lw_charts.js) bytes"

      - name: Run analysis
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python analyze.py

      - name: Check output
        run: |
          ls -lh output/report.html
          echo "createChart count: $(grep -c 'createChart' output/report.html)"

      - name: Commit report
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          # 生成したHTMLを一時保存
          cp output/report.html /tmp/report_new.html
          # リモートの最新に合わせる
          git fetch origin main
          git reset --hard origin/main
          # 生成したHTMLを配置
          cp /tmp/report_new.html output/report.html
          git add output/report.html
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Update report [$(date '+%Y-%m-%d %H:%M JST')]"
            git push origin main
          fi
