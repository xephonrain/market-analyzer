name: Market Analysis

on:
  schedule:
    - cron: '0 22 * * *'
    - cron: '0 3  * * *'
    - cron: '0 11 * * *'
  push:
    paths:
      - 'config.json'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  TZ: Asia/Tokyo

jobs:
  analyze:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install yfinance pandas numpy cairosvg

      - name: Fetch Lightweight Charts JS
        run: |
          if [ ! -f "lw_charts.js" ]; then
            npm pack lightweight-charts --silent
            tar -xzf lightweight-charts-*.tgz
            cp package/dist/lightweight-charts.standalone.production.js lw_charts.js
            rm -rf package lightweight-charts-*.tgz
          fi
          echo "lw_charts.js: $(wc -c < lw_charts.js) bytes"

      - name: Run analysis
        run: python analyze.py

      - name: Check output
        run: |
          ls -lh output/report.html
          echo "createChart count: $(grep -c 'createChart' output/report.html)"

      - name: Commit all files
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add output/report.html \
                  admin.html \
                  report.py \
                  analyze.py \
                  chart.py \
                  config_loader.py \
                  hot_stocks.py \
                  symbol_info.py \
                  manifest.json \
                  icon-192.png \
                  icon-512.png \
                  indicators/supertrend.py \
                  indicators/dow_theory.py
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Update [$(date '+%Y-%m-%d %H:%M JST')]"
            git push
          fi