<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="Admin">
<meta name="theme-color" content="#0d1117">
<title>Market Admin</title>
<style>
:root{--bg:#0d1117;--bg2:#161b22;--bg3:#21262d;--border:#30363d;--text:#e6edf3;--text2:#8b949e;--up:#26a69a;--accent:#58a6ff;--down:#ef5350;--gold:#f0c040;}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
body{background:var(--bg);color:var(--text);font-family:-apple-system,sans-serif;font-size:15px;}
header{background:var(--bg2);border-bottom:1px solid var(--border);padding:14px 16px 10px;padding-top:calc(14px + env(safe-area-inset-top,0px));position:sticky;top:0;z-index:50;}
.hrow{display:flex;align-items:center;gap:8px;}
.htitle{font-size:17px;font-weight:700;flex:1;}
.hstatus{font-size:11px;color:var(--text2);margin-top:4px;min-height:15px;}
button{cursor:pointer;border:none;font-size:14px;font-weight:600;border-radius:8px;padding:7px 16px;transition:opacity .15s;}
button:active{opacity:.7;}
#btn-run{background:var(--gold);color:#000;}
#btn-save{background:var(--accent);color:#fff;}
#btn-run:disabled,#btn-save:disabled{opacity:.4;}
#gh-bar{background:var(--bg3);border-bottom:1px solid var(--border);padding:8px 14px;display:flex;gap:8px;align-items:center;flex-wrap:wrap;}
#gh-bar label{font-size:12px;color:var(--text2);white-space:nowrap;}
#gh-bar input{background:var(--bg2);border:1px solid var(--border);border-radius:6px;color:var(--text);padding:6px 10px;font-size:13px;flex:1;min-width:80px;}
#gh-bar input::placeholder{color:var(--text2);}
.tabs{display:flex;background:var(--bg2);border-bottom:1px solid var(--border);}
.tbtn{flex:1;padding:11px 6px;background:none;border:none;color:var(--text2);font-size:13px;border-bottom:2px solid transparent;white-space:nowrap;}
.tbtn.active{color:var(--text);border-bottom-color:var(--accent);}
main{padding:0 0 80px;}
.pane{display:none;}.pane.active{display:block;}
.sec-head{padding:12px 16px 6px;font-size:11px;color:var(--text2);text-transform:uppercase;letter-spacing:.05em;}
.sym-list{padding:0 14px;display:flex;flex-direction:column;gap:8px;}
.sym-row{background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:11px 13px;display:flex;align-items:center;gap:10px;}
.sym-row.off{opacity:.5;}
.sym-info{flex:1;min-width:0;}
.sym-name{font-weight:600;font-size:15px;}
.sym-ticker{font-size:12px;color:var(--text2);margin-top:1px;}
.sym-cat{display:inline-block;font-size:10px;padding:1px 7px;border-radius:10px;background:var(--bg3);color:var(--text2);margin-top:3px;}
.sym-actions{display:flex;align-items:center;gap:10px;}
.toggle{position:relative;width:44px;height:26px;flex-shrink:0;}
.toggle input{opacity:0;width:0;height:0;}
.ttrack{position:absolute;inset:0;border-radius:13px;background:var(--border);transition:background .2s;cursor:pointer;}
.ttrack::after{content:'';position:absolute;left:3px;top:3px;width:20px;height:20px;border-radius:50%;background:#fff;transition:transform .2s;box-shadow:0 1px 3px rgba(0,0,0,.4);}
.toggle input:checked+.ttrack{background:var(--up);}
.toggle input:checked+.ttrack::after{transform:translateX(18px);}
.del-btn{width:28px;height:28px;border-radius:50%;background:rgba(218,54,51,.15);border:none;color:var(--down);font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;padding:0;}
.add-form{margin:12px 14px 0;background:var(--bg2);border:1px solid var(--border);border-radius:10px;overflow:hidden;}
.add-head{padding:10px 14px;font-size:13px;font-weight:600;color:var(--text2);border-bottom:1px solid var(--border);cursor:pointer;display:flex;justify-content:space-between;user-select:none;}
.add-body{padding:12px 14px;display:flex;flex-direction:column;gap:8px;}
.add-body.hidden{display:none;}
.frow{display:flex;gap:8px;}
.frow input,.frow select{flex:1;background:var(--bg3);border:1px solid var(--border);border-radius:6px;color:var(--text);padding:8px 10px;font-size:14px;}
.frow select option{background:var(--bg3);}
.add-submit{width:100%;padding:10px;background:var(--accent);border:none;border-radius:7px;color:#fff;font-size:14px;font-weight:600;}
.cond-list{padding:8px 14px;display:flex;flex-direction:column;gap:10px;}
.cond-card{background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:14px;}
.cond-label{font-size:13px;color:var(--text2);margin-bottom:6px;}
.cond-val{font-size:22px;font-weight:700;color:var(--accent);margin-bottom:10px;}
.cond-val span{font-size:13px;font-weight:400;color:var(--text2);margin-left:4px;}
input[type=range]{width:100%;height:4px;border-radius:2px;background:var(--border);accent-color:var(--accent);-webkit-appearance:none;cursor:pointer;}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:22px;height:22px;border-radius:50%;background:var(--accent);box-shadow:0 1px 4px rgba(0,0,0,.4);}
.tog-row{display:flex;align-items:center;justify-content:space-between;padding:4px 0;}
.tog-label{font-size:14px;}
.tf-list{padding:8px 14px;display:flex;flex-direction:column;gap:8px;}
.tf-row{background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:12px 14px;display:flex;align-items:center;gap:12px;}
.tf-info{flex:1;}
.tf-name{font-weight:600;font-size:15px;}
.tf-detail{font-size:12px;color:var(--text2);margin-top:2px;}
.wrow{display:flex;align-items:center;gap:8px;margin-top:8px;}
.wlabel{font-size:12px;color:var(--text2);white-space:nowrap;}
.wval{font-size:12px;color:var(--accent);width:16px;text-align:right;}
.st-section{padding:8px 14px;}
.st-card{background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:14px;display:flex;flex-direction:column;gap:14px;}
#toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:var(--bg3);border:1px solid var(--border);border-radius:20px;padding:10px 20px;font-size:13px;font-weight:500;opacity:0;transition:opacity .25s;pointer-events:none;white-space:nowrap;box-shadow:0 4px 16px rgba(0,0,0,.4);z-index:999;}
#toast.show{opacity:1;}
#toast.ok{border-color:var(--up);color:var(--up);}
#toast.err{border-color:var(--down);color:var(--down);}
</style>
</head>
<body>
<header>
  <div class="hrow">
    <div class="htitle">&#9881; Market Admin</div>
    <button id="btn-run" onclick="triggerAction()">&#9654; Run</button>
    <button onclick="location.reload()" style="background:var(--bg3);border:1px solid var(--border);color:var(--text2);border-radius:8px;padding:7px 12px;font-size:14px;cursor:pointer;">&#8635;</button>
    <button id="btn-save" onclick="saveToGitHub()">Save</button>
  </div>
  <div class="hstatus" id="hstatus">Enter repository and token below</div>
</header>
<div id="gh-bar">
  <label>Repo</label>
  <input id="gh-repo" type="text" placeholder="username/repo-name" oninput="onGhChange()" autocapitalize="none" autocorrect="off" spellcheck="false">
  <label>Token</label>
  <input id="gh-token" type="password" placeholder="github_pat_..." oninput="onGhChange()" autocapitalize="none" autocorrect="off">
</div>
<div class="tabs">
  <button class="tbtn active" onclick="switchTab('symbols',this)">Symbols</button>
  <button class="tbtn" onclick="switchTab('pickup',this)">Pickup</button>
  <button class="tbtn" onclick="switchTab('tf',this)">Timeframe</button>
  <button class="tbtn" onclick="switchTab('st',this)">ST Params</button>
</div>
<main>
  <div class="pane active" id="pane-symbols">
    <div id="sym-sections"></div>
    <div class="add-form">
      <div class="add-head" onclick="toggleAdd()">+ Add symbol <span id="add-arrow">&#9660;</span></div>
      <div class="add-body hidden" id="add-body">
        <div class="frow">
          <input id="new-name" type="text" placeholder="Display name">
          <input id="new-ticker" type="text" placeholder="TSLA / 7203.T / 998407.O" autocapitalize="characters" autocorrect="off" oninput="onTickerInput(this.value)">
        </div>
        <div class="frow">
          <select id="new-cat">
            <option value="US Stocks">US Stocks</option>
            <option value="JP Stocks">JP Stocks</option>
            <option value="FX">FX</option>
            <option value="Metals">Metals</option>
            <option value="Other">Other</option>
          </select>
        </div>
        <div id="ticker-hint" style="font-size:11px;color:var(--text2);min-height:14px;margin-top:-4px;"></div>
        <div id="ticker-candidates" style="display:none;background:var(--bg);border:1px solid var(--border);border-radius:6px;overflow:hidden;margin-top:-4px;"></div>
        <button class="add-submit" onclick="addSymbol()">Add</button>
      </div>
    </div>
  </div>
  <div class="pane" id="pane-pickup">
    <div class="cond-list">
      <div class="cond-card">
        <div class="cond-label">MTF Score threshold</div>
        <div class="cond-val" id="mtf-val">70<span>pt+</span></div>
        <input type="range" id="mtf-slider" min="10" max="100" step="5" value="70" oninput="document.getElementById('mtf-val').innerHTML=this.value+'<span>pt+</span>';markDirty()">
      </div>
      <div class="cond-card">
        <div class="cond-label">Min TF agreement</div>
        <div class="cond-val" id="agree-val">3<span> TF</span></div>
        <input type="range" id="agree-slider" min="1" max="5" step="1" value="3" oninput="document.getElementById('agree-val').innerHTML=this.value+'<span> TF</span>';markDirty()">
      </div>
      <div class="cond-card">
        <div class="tog-row"><span class="tog-label">Require Dow trend</span>
          <label class="toggle"><input type="checkbox" id="req-dow" checked onchange="markDirty()"><span class="ttrack"></span></label>
        </div>
      </div>
      <div class="cond-card">
        <div class="tog-row"><span class="tog-label">Require ST align</span>
          <label class="toggle"><input type="checkbox" id="req-st" checked onchange="markDirty()"><span class="ttrack"></span></label>
        </div>
      </div>
    </div>
  </div>
  <div class="pane" id="pane-tf"><div class="tf-list" id="tf-list"></div></div>
  <div class="pane" id="pane-st">
    <div class="st-section"><div class="st-card">
      <div>
        <div class="cond-label">ATR Period</div>
        <div class="cond-val" id="atr-val">10<span> bars</span></div>
        <input type="range" id="atr-slider" min="5" max="30" step="1" value="10" oninput="document.getElementById('atr-val').innerHTML=this.value+'<span> bars</span>';markDirty()">
      </div>
      <div>
        <div class="cond-label">Multiplier</div>
        <div class="cond-val" id="mult-val">3.0<span>x</span></div>
        <input type="range" id="mult-slider" min="1.0" max="6.0" step="0.5" value="3.0" oninput="document.getElementById('mult-val').innerHTML=parseFloat(this.value).toFixed(1)+'<span>x</span>';markDirty()">
      </div>
    </div></div>
  </div>
</main>
<div id="toast"></div>
<script>
var cfg=null,dirty=false;
function switchTab(n,btn){document.querySelectorAll('.tbtn').forEach(b=>b.classList.remove('active'));document.querySelectorAll('.pane').forEach(p=>p.classList.remove('active'));btn.classList.add('active');document.getElementById('pane-'+n).classList.add('active');}
function getRepo(){return document.getElementById('gh-repo').value.trim();}
function getToken(){return document.getElementById('gh-token').value.trim();}
function setStatus(m){document.getElementById('hstatus').textContent=m;}
function enableButtons(){document.getElementById('btn-save').disabled=false;document.getElementById('btn-run').disabled=false;}
function markDirty(){dirty=true;document.getElementById('btn-save').disabled=false;setStatus('Unsaved changes');}
function onGhChange(){var r=getRepo(),t=getToken();localStorage.setItem('gh_repo',r);localStorage.setItem('gh_token',t);if(r&&t){document.getElementById('btn-save').disabled=false;document.getElementById('btn-run').disabled=false;setStatus('Ready - loading config...');loadFromGitHub();}}
function restoreGh(){var r=localStorage.getItem('gh_repo')||'',t=localStorage.getItem('gh_token')||'';document.getElementById('gh-repo').value=r;document.getElementById('gh-token').value=t;if(r&&t){document.getElementById('btn-save').disabled=false;document.getElementById('btn-run').disabled=false;loadFromGitHub();}}
async function loadFromGitHub(){var r=getRepo(),t=getToken();if(!r||!t)return;setStatus('Loading...');try{var res=await fetch('https://api.github.com/repos/'+r+'/contents/config.json',{headers:{'Authorization':'Bearer '+t}});if(res.status===404){setStatus('config.json not found');renderAll(defaultConfig());enableButtons();return;}if(!res.ok)throw new Error('HTTP '+res.status);var data=await res.json();var b64=data.content.replace(/\n/g,'');var bin=atob(b64);var bytes=new Uint8Array(bin.length);for(var i=0;i<bin.length;i++)bytes[i]=bin.charCodeAt(i);var json=JSON.parse(new TextDecoder('utf-8').decode(bytes));renderAll(json);enableButtons();setStatus('Loaded \u2713');toast('Config loaded','ok');}catch(e){setStatus('Error: '+e.message);toast('Load failed: '+e.message,'err');}}
async function saveToGitHub(){var r=getRepo(),t=getToken();if(!r||!t){toast('Enter repo and token','err');return;}var btn=document.getElementById('btn-save');btn.textContent='...';btn.disabled=true;try{var sha=null;var head=await fetch('https://api.github.com/repos/'+r+'/contents/config.json',{headers:{'Authorization':'Bearer '+t}});if(head.ok)sha=(await head.json()).sha;var json=buildConfig();var body={message:'Update config.json via admin UI',content:btoa(unescape(encodeURIComponent(JSON.stringify(json,null,2))))};if(sha)body.sha=sha;var res=await fetch('https://api.github.com/repos/'+r+'/contents/config.json',{method:'PUT',headers:{'Authorization':'Bearer '+t,'Content-Type':'application/json'},body:JSON.stringify(body)});if(!res.ok)throw new Error('HTTP '+res.status);dirty=false;btn.textContent='Save';setStatus('Saved \u2713 '+new Date().toLocaleTimeString());toast('Saved to GitHub \u2713','ok');}catch(e){btn.textContent='Save';btn.disabled=false;toast('Save failed: '+e.message,'err');}}
async function triggerAction(){var r=getRepo(),t=getToken();if(!r||!t){toast('Enter repo and token','err');return;}var btn=document.getElementById('btn-run');btn.textContent='...';btn.disabled=true;try{var res=await fetch('https://api.github.com/repos/'+r+'/actions/workflows/analyze.yml/dispatches',{method:'POST',headers:{'Authorization':'Bearer '+t,'Content-Type':'application/json'},body:JSON.stringify({ref:'main'})});if(res.status===204){toast('Actions triggered \u2713','ok');setStatus('Analysis running...');}else{throw new Error('HTTP '+res.status);}}catch(e){toast('Trigger failed: '+e.message,'err');}finally{btn.textContent='\u25BA Run';btn.disabled=false;}}
function renderAll(json){cfg=JSON.parse(JSON.stringify(json));renderSymbols(cfg.symbols);renderPickup(cfg.pickup_conditions);renderTF(cfg.timeframes);renderST(cfg.supertrend_params);dirty=false;}
function renderSymbols(symbols){var cats={};symbols.forEach(function(s,i){if(!cats[s.category])cats[s.category]=[];cats[s.category].push({s:s,i:i});});var html='';Object.keys(cats).forEach(function(cat){html+='<div class="sec-head">'+cat+'</div><div class="sym-list">';cats[cat].forEach(function(item){var s=item.s,i=item.i;html+='<div class="sym-row'+(s.enabled?'':' off')+'" id="sr'+i+'"><div class="sym-info"><div class="sym-name">'+s.name+'</div><div class="sym-ticker">'+s.ticker+'</div><span class="sym-cat">'+s.category+'</span></div><div class="sym-actions"><label class="toggle"><input type="checkbox"'+(s.enabled?' checked':'')+' onchange="toggleSym('+i+',this.checked)"><span class="ttrack"></span></label><button class="del-btn" onclick="delSym('+i+')">x</button></div></div>';});html+='</div>';});document.getElementById('sym-sections').innerHTML=html;}
function toggleSym(i,v){cfg.symbols[i].enabled=v;var r=document.getElementById('sr'+i);if(r)r.classList.toggle('off',!v);markDirty();}
function delSym(i){if(!confirm('Delete "'+cfg.symbols[i].name+'"?'))return;cfg.symbols.splice(i,1);renderSymbols(cfg.symbols);markDirty();}
function addSymbol(){var name=document.getElementById('new-name').value.trim();var ticker=document.getElementById('new-ticker').value.trim().toUpperCase();var cat=document.getElementById('new-cat').value;if(!name||!ticker){toast('Enter name and ticker','err');return;}var conv=convertTicker(ticker);if(conv.converted)ticker=conv.ticker;cfg.symbols.push({name:name,ticker:ticker,category:cat,enabled:true});renderSymbols(cfg.symbols);document.getElementById('new-name').value='';document.getElementById('new-ticker').value='';toggleAdd(false);markDirty();toast('Added: '+name,'ok');}
var addOpen=false;
function toggleAdd(force){addOpen=force!==undefined?force:!addOpen;document.getElementById('add-body').classList.toggle('hidden',!addOpen);document.getElementById('add-arrow').textContent=addOpen?'\u25B2':'\u25BC';}
function renderPickup(c){document.getElementById('mtf-slider').value=c.mtf_score_threshold;document.getElementById('mtf-val').innerHTML=c.mtf_score_threshold+'<span>pt+</span>';document.getElementById('agree-slider').value=c.min_tf_agreement;document.getElementById('agree-val').innerHTML=c.min_tf_agreement+'<span> TF</span>';document.getElementById('req-dow').checked=c.require_dow_trend;document.getElementById('req-st').checked=c.require_supertrend_align;}
function renderTF(tfs){var html='';tfs.forEach(function(tf,i){html+='<div class="tf-row"><div class="tf-info"><div class="tf-name">'+tf.label+'</div><div class="tf-detail">'+tf.interval+' / '+tf.period+'</div><div class="wrow"><span class="wlabel">Weight</span><input type="range" min="1" max="5" step="1" value="'+tf.weight+'" style="flex:1;margin:0 8px" oninput="updateWeight('+i+',this.value);document.getElementById(\'wv'+i+'\').textContent=this.value"><span class="wval" id="wv'+i+'">'+tf.weight+'</span></div></div><label class="toggle"><input type="checkbox"'+(tf.enabled?' checked':'')+' onchange="toggleTF('+i+',this.checked)"><span class="ttrack"></span></label></div>';});document.getElementById('tf-list').innerHTML=html;}
function toggleTF(i,v){cfg.timeframes[i].enabled=v;markDirty();}
function updateWeight(i,v){cfg.timeframes[i].weight=parseInt(v);markDirty();}
function renderST(p){document.getElementById('atr-slider').value=p.atr_period;document.getElementById('atr-val').innerHTML=p.atr_period+'<span> bars</span>';document.getElementById('mult-slider').value=p.multiplier;document.getElementById('mult-val').innerHTML=parseFloat(p.multiplier).toFixed(1)+'<span>x</span>';}
function buildConfig(){return{symbols:cfg.symbols,timeframes:cfg.timeframes,pickup_conditions:{mtf_score_threshold:parseInt(document.getElementById('mtf-slider').value),min_tf_agreement:parseInt(document.getElementById('agree-slider').value),require_dow_trend:document.getElementById('req-dow').checked,require_supertrend_align:document.getElementById('req-st').checked},supertrend_params:{atr_period:parseInt(document.getElementById('atr-slider').value),multiplier:parseFloat(document.getElementById('mult-slider').value)}};}
function defaultConfig(){return{symbols:[{name:'Gold',ticker:'GC=F',category:'Metals',enabled:true},{name:'Silver',ticker:'SI=F',category:'Metals',enabled:true},{name:'USD/JPY',ticker:'JPY=X',category:'FX',enabled:true},{name:'EUR/USD',ticker:'EURUSD=X',category:'FX',enabled:true},{name:'SPY',ticker:'SPY',category:'US Stocks',enabled:true},{name:'QQQ',ticker:'QQQ',category:'US Stocks',enabled:true},{name:'NVIDIA',ticker:'NVDA',category:'US Stocks',enabled:true},{name:'Nikkei225',ticker:'^N225',category:'JP Stocks',enabled:true},{name:'Toyota',ticker:'7203.T',category:'JP Stocks',enabled:true},{name:'MUFG',ticker:'8306.T',category:'JP Stocks',enabled:true}],timeframes:[{label:'Weekly',interval:'1wk',period:'2y',weight:4,enabled:true},{label:'Daily',interval:'1d',period:'1y',weight:3,enabled:true},{label:'4H',interval:'1h',period:'60d',weight:2,enabled:true},{label:'1H',interval:'1h',period:'30d',weight:1,enabled:true},{label:'15M',interval:'15m',period:'60d',weight:1,enabled:true}],pickup_conditions:{mtf_score_threshold:70,min_tf_agreement:3,require_dow_trend:true,require_supertrend_align:true},supertrend_params:{atr_period:10,multiplier:3.0}};}
var _tt=null;
function toast(msg,type){var el=document.getElementById('toast');el.textContent=msg;el.className='show '+(type||'');if(_tt)clearTimeout(_tt);_tt=setTimeout(function(){el.className='';},2800);}

// -- Ticker conversion --
var JP_SPECIAL = {
  '998407':'^N225','998405':'^TOPX','998402':'^NKY',
  '1306':'1306.T','1321':'1321.T','1330':'1330.T',
  '2516':'2516.T','1547':'1547.T','1546':'1546.T'
};

// 主要日本株の日本語名テーブル
var JP_NAMES = {
  '1301':'極洋','1332':'日本水産','1333':'マルハニチロ',
  '1605':'INPEX','1721':'コムシスHD','1801':'大成建設',
  '1802':'大林組','1803':'清水建設','1808':'長谷工',
  '1812':'鹿島建設','1925':'大和ハウス','1928':'積水ハウス',
  '2002':'日清製粉G','2269':'明治HD','2282':'日本ハム',
  '2413':'エムスリー','2502':'アサヒG','2503':'キリンHD',
  '2801':'キッコーマン','2802':'味の素','2914':'JT',
  '3382':'セブン&アイ','3401':'帝人','3402':'東レ',
  '3407':'旭化成','3436':'SUMCO','3659':'ネクソン',
  '3661':'エムアップ','3673':'ブロードリーフ',
  '3697':'SHIFT','3765':'ガンホー',
  '4004':'レゾナック','4005':'住友化学','4021':'日産化学',
  '4042':'東ソー','4043':'トクヤマ','4061':'デンカ',
  '4063':'信越化学','4151':'協和キリン','4183':'三井化学',
  '4188':'三菱ケミカルG','4452':'花王','4461':'第一工業製薬',
  '4502':'武田薬品','4503':'アステラス製薬','4506':'住友ファーマ',
  '4507':'塩野義製薬','4519':'中外製薬','4523':'エーザイ',
  '4543':'テルモ','4568':'第一三共','4578':'大塚HD',
  '4661':'オリエンタルランド','4689':'LINEヤフー',

function convertTicker(raw) {
  raw = raw.trim().toUpperCase();
  var parts = raw.split('.');
  var base  = parts[0];
  var suf   = parts[1] || '';

  // Special JP index codes
  if (JP_SPECIAL[base]) {
    return { ticker: JP_SPECIAL[base], note: 'Japanese index symbol', converted: true };
  }
  // Convert .O/.OS to .T
  if (['O','OS','OS2'].includes(suf)) {
    return { ticker: base + '.T', note: 'Converted .O to .T (Yahoo Finance format)', converted: true };
  }
  // 4-digit number -> JP Stock, add .T
  if (/^\d{4}$/.test(base) && !suf) {
    var jpName = JP_NAMES[base] ? JP_NAMES[base] + ' (' + base + '.T)' : 'JP Stock ' + base + '.T';
    return { ticker: base + '.T', note: jpName, converted: true };
  }
  // 5-6 digit number -> suggest as-is
  if (/^\d{5,6}$/.test(base) && !suf) {
    return { ticker: raw, note: 'Try as-is or check Yahoo Finance for correct ticker', converted: false };
  }
  return { ticker: raw, note: '', converted: false };
}

function onTickerInput(val) {
  var hint  = document.getElementById('ticker-hint');
  var cands = document.getElementById('ticker-candidates');
  if (!val || val.length < 2) {
    hint.textContent = '';
    cands.style.display = 'none';
    return;
  }
  var result = convertTicker(val);
  if (result.converted) {
    hint.innerHTML = '-> <span style="color:var(--accent);font-weight:700">' + result.ticker + '</span> ' + result.note;
    // auto-apply button
    cands.style.display = 'block';
    var tk=result.ticker.replace(/"/g,'');
    cands.innerHTML = '<div onclick="applyTicker(&quot;'+tk+'&quot;)" style="padding:8px 12px;cursor:pointer;font-size:13px;display:flex;align-items:center;gap:8px;">'
      + '<span style="color:var(--accent);font-weight:700">'+result.ticker+'</span>'
      + '<span style="color:var(--text2);font-size:11px;">'+result.note+' - tap to use</span>'
  } else {
    hint.textContent = result.note;
    cands.style.display = 'none';
  }
}

function applyTicker(ticker) {
  document.getElementById('new-ticker').value = ticker;
  // 4桁コードなら日本語名も自動入力
  var base = ticker.replace('.T','');
  if (JP_NAMES[base] && !document.getElementById('new-name').value) {
    document.getElementById('new-name').value = JP_NAMES[base];
  }
  document.getElementById('ticker-hint').textContent = '';
  document.getElementById('ticker-candidates').style.display = 'none';
}
